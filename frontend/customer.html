<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Customer Brief — Elchemy</title>
  <link rel="stylesheet" href="/static/style.css" />
  <link rel="stylesheet" href="/static/stage1.css" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
  <header>
    <a href="/" class="back">&larr; All customers</a>
    <h1 id="company-name">Loading…</h1>
    <div id="meta" class="meta"></div>
  </header>
  <main class="customer-detail">
    <section id="brief" class="brief">Loading brief…</section>
    <aside id="raw-inspectors" class="rail">
      <details><summary>Raw HubSpot</summary><pre id="raw-hubspot">—</pre></details>
      <details><summary>Raw Elixir</summary><pre id="raw-elixir">—</pre></details>
      <details><summary>Raw News</summary><pre id="raw-news">—</pre></details>
      <details>
        <summary>
          <span>Stage 1 output</span>
          <a id="stage1-detail-link"
             class="stage1-cta"
             href="#"
             target="_blank"
             rel="noopener"
             onclick="event.stopPropagation()">View full →</a>
        </summary>
        <pre id="stage1">—</pre>
      </details>
    </aside>
  </main>
  <button id="refresh" class="refresh-btn">Refresh Brief</button>
  <script src="/static/app.js"></script>
  <script>renderCustomerDetail();</script>
</body>
</html>
