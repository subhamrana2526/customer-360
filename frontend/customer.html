<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Customer Brief — Elchemy</title>
  <link rel="stylesheet" href="/static/style.css?v=10" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
  <header>
    <a href="/" class="back">&larr; All customers</a>
    <h1 id="company-name">Loading…</h1>
    <div id="meta" class="meta"></div>
  </header>

  <main class="brief-page">
    <!-- Stats strip -->
    <section id="stats-strip" class="stats-strip"></section>

    <!-- Action bar -->
    <div class="brief-actions">
      <a id="detail-link" class="brief-link" href="#">Detailed analysis &rarr;</a>
      <button id="refresh" class="brief-refresh-btn">Refresh Brief</button>
    </div>

    <!-- Brief grid -->
    <section id="brief" class="brief-grid">
      <div class="brief-skeleton">Loading brief…</div>
    </section>

    <!-- Data sources (collapsed by default) -->
    <section class="data-sources">
      <details>
        <summary>
          <span class="ds-label">Data sources</span>
          <span class="ds-hint">Raw inputs used to generate this brief</span>
        </summary>
        <div class="ds-grid">
          <details class="ds-item">
            <summary><span class="ds-icon hs">HS</span> HubSpot conversations</summary>
            <pre id="raw-hubspot">—</pre>
          </details>
          <details class="ds-item">
            <summary><span class="ds-icon ex">EX</span> Elixir orders</summary>
            <pre id="raw-elixir">—</pre>
          </details>
          <details class="ds-item">
            <summary><span class="ds-icon nw">NW</span> News feed</summary>
            <pre id="raw-news">—</pre>
          </details>
        </div>
      </details>
    </section>
  </main>

  <script src="/static/app.js?v=10"></script>
  <script>renderCustomerDetail();</script>
</body>
</html>
