<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Elchemy Pulse</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
  <link rel="stylesheet" href="/static/style.css?v=7" />
</head>
<body>
  <header class="app-header">
    <div class="app-brand">
      <div class="brand-lockup">
        <img class="brand-logo" src="/static/favicon.svg" alt="Elchemy" />
        <div>
          <h1 class="app-title">Elchemy <span class="accent">Pulse</span></h1>
          <p class="app-tagline">Customer &amp; Market Intelligence</p>
        </div>
      </div>
    </div>
    <nav class="tabs">
      <a href="/" class="tab active">Customer 360</a>
      <a href="/mi" class="tab">Market Intelligence</a>
    </nav>
  </header>

  <main>
    <div class="page-toolbar">
      <div>
        <h2 class="page-title">Customers</h2>
        <p class="page-sub">Sales prep briefs across all accounts</p>
      </div>
      <button id="add-customer-btn" class="add-btn">+ Add Customer</button>
    </div>
    <div id="customer-grid" class="grid"></div>
  </main>

  <!-- Add Customer Modal -->
  <div id="add-customer-modal" class="modal-backdrop">
    <div class="modal">
      <h2 class="modal-title">Add Customer</h2>
      <p class="modal-sub">Enter the IDs — we'll infer the profile and generate the brief automatically.</p>
      <form id="add-customer-form">
        <label class="field-label">Company Name <span class="req">*</span></label>
        <input id="ac-company" class="field-input" type="text" placeholder="e.g. Givaudan SA" required />

        <label class="field-label">HubSpot Company ID</label>
        <input id="ac-hubspot" class="field-input" type="text" placeholder="e.g. 15453556810" />

        <label class="field-label">Elixir Customer ID</label>
        <input id="ac-elixir" class="field-input" type="text" placeholder="e.g. 32d782e0-648b-..." />

        <p id="ac-status" class="ac-status"></p>
        <p id="ac-error" class="ac-error"></p>

        <div class="modal-actions">
          <button type="button" id="ac-cancel" class="btn-secondary">Cancel</button>
          <button type="submit" id="ac-submit" class="btn-primary">Generate Brief</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/static/app.js?v=7"></script>
  <script>renderCustomerList();</script>
</body>
</html>
